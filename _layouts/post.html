---
layout: default
---
<article class="post">
    <h1>{{ page.title }}</h1>
    <p class="meta">
        <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
        {% for tag in page.tags %}<span class="tag">#{{ tag }}</span>{% endfor %}
    </p>
    {{ content }}
    <p class="back"><a href="{{ '/' | relative_url }}">&larr; back to all notes</a></p>
</article>
