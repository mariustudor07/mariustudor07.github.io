title: "Marius Tudor"
tagline: "Offensive Security Researcher"
description: "Cybersecurity student and offensive security researcher. Web exploitation and Hack The Box writeups."
author: mariustudor07
url: "https://mariustudor07.github.io"

# Clean permalinks: /blog/some-title/
permalink: /blog/:title/

markdown: kramdown
highlighter: rouge

# Generates /feed.xml (Atom) from _posts. Powers the auto-updating
# "latest writeups" list on my GitHub profile README.
plugins:
  - jekyll-feed

# Blog categories used for the filter bar (order matters)
blog_categories:
  - "Web Exploitation"
  - "HTB Writeups"
